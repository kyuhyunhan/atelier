# atelier schema v4 — Librarian overlay
# Governs all pages in the `gorae` space.
# Writer: Librarian agent owns wiki/**; human owns raw/**.

inherits: base
spaces: [gorae]
agent: librarian

page_types:

  # ── Raw sources (human-owned, Librarian READ-ONLY) ────────────────────────
  raw_source:
    path_pattern: "raw/**/*.md"
    writer: human
    required_fields:
      [schema_version, entry_id, sensitivity, created_at]
    optional_fields:
      [title, summary, collected_at, edited_at, embedded_assets, word_count,
       source, inbox_status]
    notes: "entry_id PENDING allowed pre-commit; hook resolves to UUID v5."

  # ── Structural / generated pages (classification-only, no frontmatter contract) ──
  wiki_index:
    path_pattern: "wiki/index.md"
    writer: librarian
    notes: "Auto-regenerated wiki index. No required frontmatter."

  wiki_log:
    path_pattern: "wiki/log.md"
    writer: librarian
    notes: "Append-only activity log. No required frontmatter."

  # ── Wiki pages (Librarian-owned) ──────────────────────────────────────────
  digest:
    path_pattern: "wiki/digests/YYYY-MM.md"
    filename_pattern: "^[0-9]{4}-[0-9]{2}\\.md$"
    writer: librarian
    required_fields:
      [title, type, period, entry_count, key_themes, key_entities,
       created, updated]
    field_specs:
      type:        { const: digest }
      period:      { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      entry_count: { type: integer, minimum: 0 }
      key_themes:  { type: array, items: { type: string } }
      key_entities: { type: array, items: { type: string } }
      created:     { type: string, format: date }
      updated:     { type: string, format: date }

  source:
    path_pattern: "wiki/sources/*.md"
    writer: librarian
    required_fields: [title, type, raw, visibility, created, updated]
    field_specs:
      type:       { const: source }
      raw:        { type: string, description: "wikilink to raw source" }
      visibility: { type: string, enum: [public, private] }
      created:    { type: string, format: date }
      updated:    { type: string, format: date }

  entity:
    path_pattern: "wiki/entities/*.md"
    writer: librarian
    required_fields:
      [title, type, category, first_mention, source_count, created, updated]
    field_specs:
      type:         { const: entity }
      category:
        type: string
        enum: [person, place, book, concept, organization]
      first_mention: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      source_count: { type: integer, minimum: 0 }
      created:      { type: string, format: date }
      updated:      { type: string, format: date }

  theme:
    path_pattern: "wiki/themes/*.md"
    writer: librarian
    required_fields:
      [title, type, scope, source_count, created, updated]
    optional_fields: [sub_themes]
    field_specs:
      type:         { const: theme }
      scope:
        type: string
        enum: [personal, domain, cross-domain]
      source_count: { type: integer, minimum: 0 }
      sub_themes:   { type: array, items: { type: string } }
      created:      { type: string, format: date }
      updated:      { type: string, format: date }

  synthesis:
    path_pattern: "wiki/synthesis/*.md"
    writer: librarian
    required_fields:
      [title, type, scope, query, created, updated]
    optional_fields: [domains]
    field_specs:
      type:    { const: synthesis }
      scope:
        type: string
        enum: [personal, domain, cross-domain]
      domains: { type: array, items: { type: string } }
      query:   { type: string }
      created: { type: string, format: date }
      updated: { type: string, format: date }

entity_thresholds:
  personal_person:    2
  domain_person:      1
  place:              2
  book:               1
  concept_personal:   3
  concept_domain:     2

inbox:
  path: "raw/personal/inbox/"
  status_field: inbox_status
  pending_value: pending
  note: "Mobile inbox target. Directory created in Phase 9 operational soak."
