# atelier schema v7 — base fields
# Applies to all pages across all spaces. Overlays extend or restrict.

version: 7

fields:
  schema_version:
    type: integer
    required: true
    enum: [4, 5, 7]
    description: >
      Schema authority version. v7 is current (RFC 0005 atomic graph: the
      source/entity/claim node kinds). v5 (RFC 0001 flat-facet learnings) and
      v4 are still accepted while the migration coexists; v4 records are
      rewritten to v5 when flattened, and v3 files were auto-upgraded to v4 on
      first index. The three migrations coexist — older versions stay valid.

  # --- RFC 0005 v7 common base (every atomic-graph node) -----------------
  # entry_id (below), schema_version (above), kind, created_at (below),
  # content_hash, sensitivity (below), links[]. Kind-specific fields extend
  # this in graph.overlay.yaml (base + typed extension — same discipline as
  # base.yaml + overlay).
  kind:
    type: string
    enum: [source, entity, claim]
    nullable: true
    description: >
      v7 node class (RFC 0005 §4). FIELD, never a directory — v7 nodes live
      flat under graph/. null on legacy v4/v5 pages (path/page_type-classed).

  content_hash:
    type: string
    nullable: true
    description: >
      Content address of the node body (R2 / dedup key). Stable input to the
      claim entry_id. null on legacy pages.

  links:
    type: array
    nullable: true
    default: []
    description: >
      Typed edges: [{to, rel, why}]. `to` is an entry_id (never a path) →
      rename-safe (RFC 0005 §5). rel vocabulary is kind-specific (entity:
      SKOS broader|narrower|related; claim: supports|refutes|refines).

  entry_id:
    type: string
    format: uuid-v5
    required: true
    description: >
      UUID v5 in the single vault namespace (uuid.NAMESPACE_DNS). v7 ids are
      content-addressed (RFC 0005 §5): source = created_at|discriminator,
      entity = type|pref_label (dedup key), claim = norm(statement)|derived_from.
      Stable across move / rename / shard.

  title:
    type: string
    required: true
    nullable: true

  summary:
    type: string
    nullable: true

  sensitivity:
    type: string
    enum: [private, public]
    default: private
    description: "Controls blog/export visibility. Wiki pages always private."

  created_at:
    type: array
    required: true
    items:
      type: object
      properties:
        value:     { type: string, format: date-time }
        precision: { type: string, enum: [second, minute, day, month] }
        timezone:  { type: string }
      required: [value]
    description: "Ordered list. First entry is canonical creation time."

  collected_at:
    type: array
    nullable: true
    items:
      type: object
      properties:
        value:  { type: string, format: date-time }
        source: { type: string }
        note:   { type: string }
    description: "Mobile-ready: when/how content was captured externally."

  edited_at:
    type: array
    nullable: true
    items:
      type: object
      properties:
        value:     { type: string, format: date-time }
        precision: { type: string }
        timezone:  { type: string }

  embedded_assets:
    type: array
    default: []
    description: "Asset slugs (R2 keys). Populated by pre-commit hook."

  word_count:
    type: integer
    default: 0
    description: "Populated by pre-commit hook."

  # Mobile-ready fields — active in Phase H (not validated Phase 0-8)
  source:
    type: string
    nullable: true
    description: "Capture channel: mobile | web-clipper | manual | gorae-new"

  inbox_status:
    type: string
    enum: [pending, processed, archived]
    nullable: true
    description: "Mobile inbox lifecycle. null = not an inbox item."

upgrades:
  v3_to_v4:
    description: "Non-breaking. schema_version bump only; all field meanings preserved."
    auto_migrate: true
    changes:
      - field: schema_version
        from: 3
        to: 4
  v4_to_v5:
    description: >
      Learnings flat-facet migration (RFC 0001). Additive + one relaxation:
      `aspect[]` and typed `links:[{to,why}]` added; `target_topic` demoted from
      required to optional on accepted learnings; accepted notes move from
      by-topic/by-project trees to a flat notes/<YYYY-MM>/ store. The
      schema_version bump rides with the on-disk flatten (P4), not the field
      contract change (P1), so v4 records stay valid until rewritten.
    auto_migrate: true
    changes:
      - field: schema_version
        from: 4
        to: 5
