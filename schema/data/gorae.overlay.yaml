# atelier schema v5 — gorae-space overlay
# Governs all pages in the `gorae` space.
# Writer: wiki/** is wiki-write; raw/** is human-owned (read-only to the engine).
# (RFC 0001 retired the "Librarian" agent persona — this is a space contract.)

inherits: base
spaces: [gorae]

page_types:

  # ── Raw sources (human-owned, engine READ-ONLY) ───────────────────────────
  raw_source:
    # Scoped to the two genres raw_source owns, by SECOND path segment. fnmatch's
    # single `*` crosses `/`, so `raw/personal/*.md` matches personal pages
    # at ANY depth (single- AND multi-level) — unlike `**/*.md`, whose literal `/`
    # requires an intermediate dir. This (a) keeps single-depth pages classified
    # and (b) excludes `raw/learning/**` wholesale (RFC 0003 P6 / RFC 0005 P2) —
    # including flat files like archived/<id>.md that match no learning_* glob and
    # would otherwise fall through to this catch-all and be mislabeled raw_source.
    # The legacy `provenance/...` forms are kept so pages predating the P2 rename
    # still classify; new content lives under `raw/`.
    path_patterns: ["raw/personal/*.md", "raw/knowledge/*.md",
                    "provenance/personal/*.md", "provenance/knowledge/*.md"]
    writer: human
    required_fields:
      [schema_version, entry_id, sensitivity, created_at]
    optional_fields:
      [title, summary, collected_at, edited_at, embedded_assets, word_count,
       source, inbox_status]
    notes: "entry_id PENDING allowed pre-commit; hook resolves to UUID v5."

  # ── Structural / generated pages (classification-only, no frontmatter contract) ──
  wiki_index:
    path_patterns: ["graph/index.md", "wiki/index.md"]
    writer: wiki-write
    notes: "Auto-regenerated wiki index. No required frontmatter."

  wiki_log:
    path_patterns: ["graph/log.md", "wiki/log.md"]
    writer: wiki-write
    notes: "Append-only activity log. No required frontmatter."

  # ── Wiki pages (Librarian-owned) ──────────────────────────────────────────
  digest:
    path_patterns: ["graph/digests/YYYY-MM.md", "wiki/digests/YYYY-MM.md"]
    filename_pattern: "^[0-9]{4}-[0-9]{2}\\.md$"
    writer: wiki-write
    required_fields:
      [title, type, period, entry_count, key_themes, key_entities,
       created, updated]
    field_specs:
      type:        { const: digest }
      period:      { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      entry_count: { type: integer, minimum: 0 }
      key_themes:  { type: array, items: { type: string } }
      key_entities: { type: array, items: { type: string } }
      created:     { type: string, format: date }
      updated:     { type: string, format: date }

  source:
    path_patterns: ["graph/sources/*.md", "wiki/sources/*.md"]
    writer: wiki-write
    required_fields: [title, type, raw, visibility, created, updated]
    field_specs:
      type:       { const: source }
      raw:        { type: string, description: "wikilink to raw source" }
      visibility: { type: string, enum: [public, private] }
      created:    { type: string, format: date }
      updated:    { type: string, format: date }

  entity:
    path_patterns: ["graph/entities/*.md", "wiki/entities/*.md"]
    writer: wiki-write
    # first_mention is OPTIONAL (RFC 0003): `domain` entities (folded themes) and
    # concept stubs have no single first-mention month; only event/person-like
    # entities do. When present it is still pattern-checked — enforcement comes
    # from the `field_specs` entry below (which fires on presence), NOT from
    # listing it in optional_fields (that list is documentation for authors).
    required_fields:
      [title, type, category, source_count, created, updated]
    optional_fields: [first_mention, subtype, scope, sub_themes, aliases]
    field_specs:
      type:         { const: entity }
      category:
        type: string
        # `domain` (RFC 0003 §4): a thematic hub — knowledge OR personal — that
        # folded themes become; the original theme `scope` is preserved as a field.
        enum: [person, place, book, concept, organization, domain]
      first_mention: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      source_count: { type: integer, minimum: 0 }
      created:      { type: string, format: date }
      updated:      { type: string, format: date }

  theme:
    path_patterns: ["graph/themes/*.md", "wiki/themes/*.md"]
    writer: wiki-write
    required_fields:
      [title, type, scope, source_count, created, updated]
    optional_fields: [sub_themes]
    field_specs:
      type:         { const: theme }
      scope:
        type: string
        enum: [personal, domain, cross-domain]
      source_count: { type: integer, minimum: 0 }
      sub_themes:   { type: array, items: { type: string } }
      created:      { type: string, format: date }
      updated:      { type: string, format: date }

  synthesis:
    path_patterns: ["graph/synthesis/*.md", "wiki/synthesis/*.md"]
    writer: wiki-write
    required_fields:
      [title, type, scope, query, created, updated]
    optional_fields: [domains]
    field_specs:
      type:    { const: synthesis }
      scope:
        type: string
        enum: [personal, domain, cross-domain]
      domains: { type: array, items: { type: string } }
      query:   { type: string }
      created: { type: string, format: date }
      updated: { type: string, format: date }

entity_thresholds:
  personal_person:    2
  domain_person:      1
  place:              2
  book:               1
  concept_personal:   3
  concept_domain:     2

inbox:
  path: "raw/personal/inbox/"
  status_field: inbox_status
  pending_value: pending
  note: "Mobile inbox target. Directory created in Phase 9 operational soak."
