# atelier schema v4 — Lint rules (L1–L7)
# Each rule is data: id, severity, automation, check function name, fix function.
# runtime/lint/ reads this file at startup.

rules:

  L1:
    id: L1
    name: broken-links
    severity: FAIL
    automation: auto
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      All [[provenance/...]] links in graph/** must resolve to an existing file.
      A broken link means the provenance chain is broken. (raw/→provenance/,
      wiki/→graph/ post-GP1; both prefixes covered for legacy vaults.)
    check: check_raw_links_exist
    fix: null
    db_query: >
      SELECT p.slug, l.to_target
      FROM links l
      JOIN pages p ON p.id = l.from_page
      WHERE l.to_page_id IS NULL
        AND (l.to_target LIKE 'provenance/%' OR l.to_target LIKE 'raw/%')
        AND (p.slug LIKE 'graph/%' OR p.slug LIKE 'wiki/%')

  L2:
    id: L2
    name: hallucination
    severity: FAIL
    automation: manual
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      Wiki facts must be traceable to raw sources. No external knowledge injection.
      Types: external knowledge, false reference, false date.
    check: null
    fix: null
    notes: "LLM-dependent. Automated version deferred to v0.2."

  L3:
    id: L3
    name: source-count
    severity: WARN
    automation: auto
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      entity.source_count must equal the actual number of inbound links.
      (Originally counted digest/source/synthesis pages; digests & synthesis were
      retired in GP5, so inbound is now sources + entities.) Tolerance: ±1.
    check: check_source_count
    fix: fix_source_count_recount
    tolerance: 1
    db_query: >
      SELECT e.canonical_slug,
             CAST(json_extract(p.frontmatter, '$.source_count') AS INTEGER) AS declared,
             COUNT(l.id) AS actual
      FROM entities e
      JOIN pages p ON p.slug = e.canonical_slug
      LEFT JOIN links l ON l.to_page_id = p.id
      WHERE p.page_type = 'entity'
      GROUP BY e.canonical_slug
      HAVING ABS(declared - actual) > 1

  L4:
    id: L4
    name: first-mention
    severity: WARN
    automation: manual
    spaces: []
    description: >
      RETIRED (RFC 0003 GP5): derived entity.first_mention from inbound DIGEST
      periods, but digests were retired to query-time and first_mention is now an
      optional field. Never implemented (no check_first_mention) and removed from
      run_on_lint_command. Kept as a historical record.
    check: null
    fix: null

  L5:
    id: L5
    name: orphan
    severity: WARN
    automation: auto
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      All graph pages (except index.md and log.md) must have at least 1 inbound
      [[...]] link. graph/ is the post-GP1 home; wiki/ kept for legacy vaults.
    check: check_orphan_pages
    fix: null
    excluded_slugs: [graph/index.md, graph/log.md, wiki/index.md, wiki/log.md]
    db_query: >
      SELECT p.slug
      FROM pages p
      LEFT JOIN (
        SELECT to_page_id, COUNT(*) AS cnt
        FROM links
        GROUP BY to_page_id
      ) bc ON bc.to_page_id = p.id
      WHERE (p.slug LIKE 'graph/%' OR p.slug LIKE 'wiki/%')
        AND p.slug NOT IN ('graph/index.md', 'graph/log.md', 'wiki/index.md', 'wiki/log.md')
        AND (bc.cnt IS NULL OR bc.cnt = 0)

  L6:
    id: L6
    name: stale
    severity: INFO
    automation: auto
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      Every provenance/ source file (mtime tracked) should have a corresponding
      graph/sources/ page. (raw/→provenance/, wiki/→graph/ post-GP1; the check is
      page_type-based so it is path-agnostic.) personal/diary files were covered by
      digests — now query-time; flag-or-exempt as preferred.
    check: check_stale_sources
    fix: null
    exemptions:
      - path_pattern: "provenance/personal/diary/**"
        covered_by: query-time-synthesis
      - path_pattern: "provenance/personal/inbox/**"
        covered_by: inbox_status
      - path_pattern: "raw/personal/diary/**"
        covered_by: query-time-synthesis
      - path_pattern: "raw/personal/inbox/**"
        covered_by: inbox_status

  L7:
    id: L7
    name: gap
    severity: INFO
    automation: manual
    spaces: []   # space-agnostic: rules filter by page_type / slug, not space
    description: >
      A name appearing in 3+ distinct digests without a dedicated entity page
      is a gap candidate.
    check: null
    fix: null
    threshold: 3
    notes: "Automated detection deferred; requires NLP or heuristic name extraction."

# ── Global settings ───────────────────────────────────────────────────────────
defaults:
  run_on_lint_command: [L1, L3, L5, L6]   # L4 retired (GP5); see its entry
  fixable_rules:       [L3]
  manual_rules:        [L2, L7]
  fail_on_severity:    [FAIL]
  warn_on_severity:    [WARN]
  info_on_severity:    [INFO]
